<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClimaChat – Climate Education AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
</head>
<body>

  <div id="app">
    <div class="bg-glow"></div>

    <!-- ── Header ── -->
    <header>
      <div class="logo">
        <div class="logo-icon">🌍</div>
        <div>
          <div class="logo-title">ClimaChat</div>
          <div class="logo-sub">Climate Education AI</div>
        </div>
      </div>

      <div class="header-right">
        <div class="mode-bar">
          <button class="mode-btn active" id="btn-chat">💬 Ask</button>
          <button class="mode-btn"        id="btn-myth">🔍 Myth Buster</button>
        </div>
      </div>
    </header>

    <!-- ── Body (empty state or messages injected here) ── -->
    <div class="main-scroll" id="body-area"></div>

    <!-- ── Input bar ── -->
    <div class="input-bar">
      <div class="input-inner">
        <div class="input-row">
          <input
            class="chat-input"
            id="chat-input"
            type="text"
            placeholder="Ask anything about climate science..."
            autocomplete="off"
          />
          <button class="send-btn" id="send-btn" disabled>↑</button>
        </div>
        <div class="input-footer">
          CLIMACHAT &nbsp;•&nbsp; POWERED BY AI &nbsp;•&nbsp; BUILT FOR STUDENTS
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
